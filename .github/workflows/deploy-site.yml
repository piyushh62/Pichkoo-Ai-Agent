name: Deploy Site to Hugging Face.

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'skills/**'
      - 'optional-skills/**'
      - '.github/workflows/deploy-site.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyyaml==6.0.2 httpx==0.28.1

      - name: Build skills index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/build_skills_index.py

      - name: Extract skill metadata
        run: |
          python3 website/scripts/extract-skills.py

      - name: Generate skill documentation
        run: |
          python3 website/scripts/generate-skill-docs.py

      - name: Install website dependencies
        working-directory: website
        run: |
          npm ci

      - name: Build Docusaurus website
        working-directory: website
        run: |
          npm run build

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://oauth2:${HF_TOKEN}@huggingface.co/spaces/YOUR_USERNAME/YOUR_SPACE hf-space

      - name: Copy website to Space
        run: |
          rm -rf hf-space/*
          cp -R website/build/* hf-space/

      - name: Deploy to Hugging Face
        run: |
          cd hf-space

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Deploy from GitHub Actions - $(date)" || echo "No changes"

          git push
